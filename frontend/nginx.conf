server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle client-side routing with no-cache for HTML
    location / {
        try_files $uri $uri/ /index.html;

        # Prevent caching of index.html to ensure latest version
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://api:8787/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache hashed assets (Vite generates files with hashes like app-BdRIPbBJ.js)
    location ~* \-[a-zA-Z0-9_-]+\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache regular JS/CSS without hash
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}