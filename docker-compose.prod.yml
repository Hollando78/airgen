services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
    secrets:
      - traefik_basic_auth_users
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`airgen.studio`) && PathPrefix(`/traefik`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.traefik.middlewares=production-auth@docker"
      - "traefik.http.middlewares.production-auth.basicauth.users=${TRAEFIK_BASIC_AUTH_USERS}"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  neo4j:
    image: neo4j:5.25
    environment:
      NEO4J_AUTH: "${GRAPH_USERNAME}/${GRAPH_PASSWORD}"
    secrets:
      - neo4j_password
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT}
      API_ENV: production
      # Removed: API_JWT_SECRET (use Docker secret)
      # Removed: GRAPH_PASSWORD (use Docker secret)
      # Removed: LLM_API_KEY (use Docker secret)
      # Removed: SMTP_PASSWORD (use Docker secret)
      # Removed: RESTIC_PASSWORD (use Docker secret)
      # Removed: AWS_SECRET_ACCESS_KEY (use Docker secret)
      # DATABASE_URL password will be read from secret
      DATABASE_URL_TEMPLATE: "postgresql://${POSTGRES_USER}:__PASSWORD__@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379"
      WORKSPACE_ROOT: /workspace
      AI_DRAFT_LIMIT: ${AI_DRAFT_LIMIT:-5}
      AI_DRAFT_CACHE_TTL: ${AI_DRAFT_CACHE_TTL:-900}
      GRAPH_URL: bolt://neo4j:7687
      GRAPH_USERNAME: ${GRAPH_USERNAME}
      GRAPH_DATABASE: ${GRAPH_DATABASE:-neo4j}
      GRAPH_ENCRYPTED: ${GRAPH_ENCRYPTED:-false}
      LLM_PROVIDER: "${LLM_PROVIDER}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      LLM_BASE_URL: "${LLM_BASE_URL}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.2}"
      APP_URL: "${APP_URL}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      EMAIL_FROM: "${EMAIL_FROM}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USER: "${SMTP_USER}"
      RATE_LIMIT_GLOBAL_MAX: "${RATE_LIMIT_GLOBAL_MAX:-100}"
      RATE_LIMIT_GLOBAL_WINDOW: "${RATE_LIMIT_GLOBAL_WINDOW:-60000}"
      RATE_LIMIT_AUTH_MAX: "${RATE_LIMIT_AUTH_MAX:-5}"
      RATE_LIMIT_AUTH_WINDOW: "${RATE_LIMIT_AUTH_WINDOW:-300000}"
      RATE_LIMIT_LLM_MAX: "${RATE_LIMIT_LLM_MAX:-20}"
      RATE_LIMIT_LLM_WINDOW: "${RATE_LIMIT_LLM_WINDOW:-3600000}"
      # ARCHIVED: SnapDraft feature flags
      # SNAPDRAFT_ENABLE_SEMANTIC_FILTERING: "${SNAPDRAFT_ENABLE_SEMANTIC_FILTERING:-false}"
      # SNAPDRAFT_ENABLE_FACT_EXTRACTION: "${SNAPDRAFT_ENABLE_FACT_EXTRACTION:-false}"
      # SNAPDRAFT_SEMANTIC_SIMILARITY_THRESHOLD: "${SNAPDRAFT_SEMANTIC_SIMILARITY_THRESHOLD:-0.7}"
      # SNAPDRAFT_SEMANTIC_RESULT_LIMIT: "${SNAPDRAFT_SEMANTIC_RESULT_LIMIT:-10}"
      # Imagine visualization configuration
      IMAGINE_MODEL: "${IMAGINE_MODEL:-gemini-2.5-flash-image}"
      IMAGINE_ASPECT_RATIO: "${IMAGINE_ASPECT_RATIO:-16:9}"
      BACKUP_SCRIPT_ROOT: /app/scripts
      PROJECT_ROOT: /root/airgen
      BACKUP_ROOT: /root/airgen/backups
      WORKSPACE_DIR: /root/airgen/backend/workspace
      NEO4J_CONTAINER: airgen_neo4j_1
      POSTGRES_CONTAINER: airgen_postgres_1
      REDIS_CONTAINER: airgen_redis_1
      NEO4J_VOLUME: airgen_neo4jdata
      POSTGRES_VOLUME: airgen_pgdata
      RESTIC_REPOSITORY: "${RESTIC_REPOSITORY}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
    secrets:
      - postgres_password
      - neo4j_password
      - api_jwt_secret
      - llm_api_key
      - gemini_api_key
      - smtp_password
      - restic_password
      - aws_secret_access_key
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`airgen.studio`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      # Route /imagine/ paths to API for serving generated images (trailing slash ensures we don't catch /imagine-gallery)
      - "traefik.http.routers.api-imagine.rule=Host(`airgen.studio`) && PathPrefix(`/imagine/`)"
      - "traefik.http.routers.api-imagine.entrypoints=websecure"
      - "traefik.http.routers.api-imagine.priority=10"
      - "traefik.http.routers.api-imagine.tls=true"
      - "traefik.http.routers.api-imagine.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=${API_PORT}"
    volumes:
      - ./workspace:/workspace
      - ./scripts:/app/scripts:ro
      - .:/root/airgen
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/spool/cron/crontabs:/host-crontabs:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`airgen.studio`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.frontend.middlewares=production-auth@docker"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      - api
    restart: unless-stopped

  docs:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs.rule=Host(`docs.airgen.studio`)"
      - "traefik.http.routers.docs.entrypoints=websecure"
      - "traefik.http.routers.docs.tls=true"
      - "traefik.http.routers.docs.tls.certresolver=letsencrypt"
      - "traefik.http.services.docs.loadbalancer.server.port=80"
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:

secrets:
  postgres_password:
    file: /root/airgen-secrets/postgres_password
  neo4j_password:
    file: /root/airgen-secrets/neo4j_password
  api_jwt_secret:
    file: /root/airgen-secrets/api_jwt_secret
  llm_api_key:
    file: /root/airgen-secrets/llm_api_key
  gemini_api_key:
    file: /root/airgen-secrets/gemini_api_key
  smtp_password:
    file: /root/airgen-secrets/smtp_password
  restic_password:
    file: /root/airgen-secrets/restic_password
  aws_secret_access_key:
    file: /root/airgen-secrets/aws_secret_access_key
  traefik_basic_auth_users:
    file: /root/airgen-secrets/traefik_basic_auth_users
